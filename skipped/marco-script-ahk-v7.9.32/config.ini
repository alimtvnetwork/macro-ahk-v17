[Hotkeys]
ComboDown=^Down
ComboUp=^Up
GmailUnread=^+F9
; MacroLoop dedicated shortcuts (Ctrl+Shift+Up/Down)
MacroLoopUp=^+Up
MacroLoopDown=^+Down
; Loop interval adjustment (Ctrl+Shift+[ and ])
LoopIntervalDecrease=^+[
LoopIntervalIncrease=^+]
; Interval step in ms (how much to add/subtract per keypress)
LoopIntervalStep=5000
; Delegate hotkeys - JS triggers these, AHK handles tab switching
DelegateUp=^+=
DelegateDown=^+-
; Ctrl+Alt+Up/Down for combo (works alongside Ctrl+Up/Down)
ComboAltUp=^!Up
ComboAltDown=^!Down
; Smart shortcuts: 1 = check URL first, 0 = direct combo (no URL check)
UseSmartShortcuts=0

; ============================================
; ComboSwitch - Project transfer automation
; ============================================

[ComboSwitch.XPaths]
; XPaths for combo switch modal elements
TransferButtonXPath=/html/body/div[2]/div/div/div/div/div/div/div[1]/div/div/div[3]/div[6]/div[2]/button
; Project name element (visible in the project header bar)
ProjectNameXPath=/html/body/div[2]/div/div/div/div/div/div/div[1]/div/div/div[2]/div/div[1]/div/p
; NOTE: These XPaths match V1's proven working values (div[5])
; If combo fails, check these XPaths match your page's actual DOM
Combo1XPath=/html/body/div[6]/div[2]/div[1]/div/p
Combo2ButtonXPath=/html/body/div[6]/div[2]/div[2]/button
OptionsContainerXPath=/html/body/div[7]/div
ConfirmButtonXPath=/html/body/div[6]/div[3]/button[2]

[ComboSwitch.Transfer]
; Fallback methods when Transfer XPath fails (pipe-separated)
TextMatch=Transfer|Transfer project
Tag=button
Selector=
AriaLabel=Transfer
HeadingSearch=transfer
Role=

[ComboSwitch.Combo1]
; Combo1 = current project text element
TextMatch=
Tag=p
Selector=div[role="dialog"] p.min-w-0.truncate|div[role="dialog"] p.truncate|div[role="dialog"] p|[data-radix-popper-content-wrapper] p|div[role="alertdialog"] p.truncate|div[role="alertdialog"] p|[class*="DialogContent"] p.truncate|[class*="DialogContent"] p
AriaLabel=
HeadingSearch=
Role=

[ComboSwitch.Combo2]
; Combo2 = project dropdown button
TextMatch=
Tag=button
Selector=div[role="dialog"] button[role="combobox"]|div[role="dialog"] button:not(:last-child)
AriaLabel=
HeadingSearch=
Role=combobox

[ComboSwitch.Options]
; Options = dropdown list container
TextMatch=
Tag=
Selector=[role="listbox"]|[data-radix-popper-content-wrapper] > div|[cmdk-list]
AriaLabel=
HeadingSearch=
Role=listbox

[ComboSwitch.Confirm]
; Confirm = transfer confirmation button
TextMatch=Confirm|Confirm transfer|Save
Tag=button
Selector=div[role="dialog"] button:last-child|div[role="alertdialog"] button:last-child|div[role="dialog"] button[type="submit"]
AriaLabel=
HeadingSearch=
Role=

[ComboSwitch.Timing]
; Timing controls (ms)
PollIntervalMs=300
OpenMaxAttempts=20
WaitMaxAttempts=20
; S-005: Auto-retry on combo failure
RetryCount=2
RetryDelayMs=1000
; Delay (ms) after selecting option before clicking Confirm button
ConfirmDelayMs=500

[ComboSwitch.ElementIDs]
ScriptMarkerId=ahk-combo-script
ButtonContainerId=ahk-combo-btn-container
ButtonUpId=ahk-combo-up-btn
ButtonDownId=ahk-combo-down-btn
JsExecutorId=ahk-js-executor
JsExecuteBtnId=ahk-js-execute-btn
ProgressStatusId=__combo_progress_status__

[ComboSwitch.Shortcuts]
FocusTextboxKey=/
ComboUpKey=ArrowUp
ComboDownKey=ArrowDown
ShortcutModifier=none

; ============================================
; MacroLoop - Automated project cycling
; ============================================

[MacroLoop.Timing]
; Main loop interval between cycles (ms)
LoopIntervalMs=50000
; Countdown update interval (ms)
CountdownIntervalMs=1000
; Delay before first cycle starts (ms)
FirstCycleDelayMs=500
; Delay after combo completes before returning (ms)
PostComboDelayMs=4000
; Page load wait time (ms)
PageLoadDelayMs=2500
; Wait time (ms) after clicking project button before checking progress bar
DialogWaitMs=3000
; Workspace auto-check interval (ms)
WorkspaceCheckIntervalMs=5000

[MacroLoop.URLs]
RequiredDomain=https://lovable.dev/
SettingsTabPath=/settings?tab=project
DefaultView=?view=codeEditor

[MacroLoop.XPaths]
; Project button to click each cycle
ProjectButtonXPath=/html/body/div[2]/div/div[2]/nav/div/div/div/div[1]/div[1]/button
; Main progress bar - ALWAYS present when project dialog is fully loaded
MainProgressXPath=/html/body/div[6]/div/div[2]/div[2]/div/div[2]/div/div[1]
; Free credit progress bar - only present when free credits remain
ProgressXPath=/html/body/div[6]/div/div[2]/div[2]/div/div[2]/div/div[2]
; Workspace name element (visible after clicking Project Button)
WorkspaceNameXPath=/html/body/div[6]/div/div[2]/div[1]/p
; v6.55: Workspace name in persistent nav (top-left, NO dialog needed)
; If empty, JS auto-discovers via CSS selectors (nav button text)
WorkspaceNavXPath=
; Free credit progress bar (visible after clicking Project Button)
FreeCreditProgressXPath=/html/body/div[6]/div/div[2]/div[2]/div/div[2]/div/div[2]
; Prompt area XPath - if focused/active, skip opening project dialog
PromptActiveXPath=/html/body/div[2]/div/div[2]/main/div/div/div[1]/div/div[2]/div/form/div[2]
; Container to append loop controls UI
LoopControlsXPath=/html/body/div[2]/div/div[2]/main/div/div/div[3]

[MacroLoop.ElementIDs]
LoopScriptMarkerId=ahk-loop-script
LoopContainerId=ahk-loop-container
LoopStatusId=ahk-loop-status
LoopStartBtnId=ahk-loop-start-btn
LoopStopBtnId=ahk-loop-stop-btn
LoopUpBtnId=ahk-loop-up-btn
LoopDownBtnId=ahk-loop-down-btn
LoopRecordIndicatorId=ahk-loop-record
LoopJsExecutorId=ahk-loop-js-executor
LoopJsExecuteBtnId=ahk-loop-js-execute-btn

[MacroLoop.Shortcuts]
FocusTextboxKey=/
StartKey=s
StopKey=x
ShortcutModifier=none

; ============================================
; AHK - Internal timing delays
; ============================================

[AHK.Timing]
; Delay after opening DevTools console
ConsoleOpenDelayMs=800
; Delay after pasting content
PasteDelayMs=200
; Delay after pressing Enter to execute
ExecuteDelayMs=300
; Delay for browser to activate
BrowserActivateDelayMs=150
; Delay for address bar operations
AddressBarDelayMs=100
; Delegate tab switching delay
DelegateTabSwitchDelayMs=300
; Max tabs to search when looking for settings
DelegateMaxTabSearch=10
; Delay after clicking page content to anchor execution context (ms)
PageClickDelayMs=100

; ============================================
; Gmail - Unread search automation
; ============================================

[Gmail]
URL=https://mail.google.com
SearchQuery=in:inbox is:unread
OpenDelayMs=1500
SlashDelayMs=500
TypeDelayMs=300
EnterDelayMs=100

; ============================================
; CreditStatus - API credit monitoring
; ============================================

[CreditStatus.API]
LovableApiBaseUrl=https://api.lovable.dev
; Auth mode: cookieSession (preferred), token, or officialFlow
LovableAuthMode=cookieSession
; Bearer token - only used if LovableAuthMode=token (REDACTED in logs)
LovableBearerToken=

[CreditStatus.Timing]
; Enable auto-refresh: 1=yes, 0=no
AutoCheckEnabled=1
; Seconds between auto-checks
AutoCheckIntervalSeconds=60
; Skip re-fetch if last check was within this many seconds
CacheTtlSeconds=30

[CreditStatus.Retry]
MaxRetries=2
RetryBackoffMs=1000

[CreditStatus.XPaths]
PlansButtonXPath=/html/body/div[3]/div/div/aside/nav/div[2]/div[2]/button[3]
FreeProgressBarXPath=/html/body/div[3]/div/div/div/div/div/div/div[10]/div/div/div[2]/div/div[2]/div/div[2]/div/div[2]/div/div[4]
TotalCreditsXPath=/html/body/div[3]/div/div/div/div/div/div/div[10]/div/div/div[2]/div/div[2]/div/div[1]/p[2]

[CreditStatus.ElementIDs]
CreditStatusId=ahk-credit-status
CreditStatusBtnId=ahk-credit-status-btn

; ============================================
; General - Global settings
; ============================================

[General]
BrowserExe=chrome.exe
ScriptVersion=7.9.32
; Debug mode: 1 = verbose logging, 0 = minimal logging
Debug=1
; Config hot-reload: poll interval in ms (0 = disabled)
ConfigWatchIntervalMs=2000